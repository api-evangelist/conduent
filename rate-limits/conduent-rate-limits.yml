specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Conduent
providerId: conduent
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Business Process Services
  - Technology
  - Rate Limiting
description: Conduent does not publish a public developer-portal rate-limit specification. Throttling
  and quota policy is defined per enterprise services contract. Clients should design for 429 responses
  with backoff regardless.
notes: No public rate-limit numbers exist for Conduent's APIs. Reconcile against the active services
  contract or onboarding documentation.
sources:
  - https://www.conduent.com
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Per-Contract Throttling
    scope: contract
    metric: varies
    limit: 'see Conduent services contract'
    notes: Limits are negotiated per enterprise customer; no public RPS/RPM thresholds are published.
policies:
  - name: Backoff Strategy
    description: Implement exponential backoff with jitter on 429 / 503 responses.
  - name: Contract-Scoped Access
    description: API access is scoped per enterprise services contract; raised limits are handled through
      the customer's account team rather than self-serve.
maintainers:
