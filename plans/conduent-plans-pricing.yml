        description: Programmatic access scoped per enterprise services contract
        name: api_access
        type: subscription
        metric: varies
        limit: 'see Conduent contract'
        timeFrame: year
        geo: configurable
        unit: 1
        price: 'see Conduent contract'
        userMultiplied: false
    elements:
      - name: Conduent API
