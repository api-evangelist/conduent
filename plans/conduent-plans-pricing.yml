description: Conduent does not publish a self-serve, public developer pricing surface. Programmatic access
  to Conduent platform services is delivered through enterprise contracts and BPO engagements with named
  customers (transportation, government, commercial). Pricing is not publicly listed.
notes: Conduent does not publish a public pricing page or developer portal pricing tiers. Any plan numbers
  in this file are placeholders; reconcile against the customer's enterprise services contract.
sources:
