description: 'FOCUS-aligned FinOps for Conduent: services-bundled enterprise BPO contract; API consumption
  is not separately billed but is governed by the master services agreement.'
notes: Conduent is a BPO services company; API access is bundled into the broader services contract.
  Per-call billing is not exposed.
sources:
  - https://www.conduent.com
billingModel:
  pricingCategory: Enterprise Services Contract
  billingFrequency: Per-Invoice
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Tax
    - Adjustment
focusColumns:
  ServiceName: Conduent
  ServiceCategory: Business Process Services
  ProviderName: Conduent
  PublisherName: Conduent Business Services, LLC
  InvoiceIssuerName: Conduent Business Services, LLC
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: services_contract
    description: Conduent enterprise services / BPO contract value
    unit: month
    aggregation: max
    dimensions:
      - product
      - tenant
  - name: api_calls_internal
    description: Internal-only meter for chargeback within the customer organization. Not billed externally.
    unit: request
    aggregation: sum
    dimensions:
      - api
      - consumer_app
principles:
  - name: Visibility
    description: Track API usage internally via consumer application credentials; consult the Conduent
      account team for usage reporting tied to the services contract.
  - name: Allocation
    description: Allocate the bundled services contract across business units using the underlying business-process
      activity (transactions, cases, calls handled).
  - name: Optimization
    description: Optimize through scope refinement on the services contract — review unused integrations
      and module activation at renewal.
  - name: Accountability
    description: Operations / vendor-management owners typically hold the Conduent contract; integration
      owners are accountable for staying within negotiated API capacity.
maintainers:
